<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="AI System Building and Operating Cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="30%" stop-color="#1e293b"/>
      <stop offset="70%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <style>
      .section-title { font: 600 12px Inter, system-ui, sans-serif; }
      .box-label { font: 600 10px Inter, system-ui, sans-serif; text-anchor: middle; }
      .metric { font: 500 10px Inter, system-ui, sans-serif; }
      .tagline { font: 500 24px Inter, system-ui, sans-serif; fill: #a7f3d0; letter-spacing: 0.5px; }
      .title { font: 700 44px Inter, system-ui, sans-serif; fill: #ffffff; }
      .subtitle { font: 600 20px Inter, system-ui, sans-serif; fill: #0ea5e9; }
      .step { font: 600 11px Inter, system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative (right edge, away from content) -->
  <g fill="rgba(255,255,255,0.03)">
    <circle cx="1080" cy="100" r="90"/>
    <circle cx="1120" cy="280" r="70"/>
  </g>

  <!-- Row 1: ML Pipeline -->
  <g transform="translate(48, 36)">
    <text class="section-title" x="0" y="0" fill="#0ea5e9">ML Pipeline</text>
    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="64" height="36" rx="5" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2"/>
      <text class="box-label" x="32" y="22" fill="#0ea5e9">Ingest</text>
      <path d="M72 18 H88" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="96" y="0" width="64" height="36" rx="5" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2"/>
      <text class="box-label" x="128" y="22" fill="#0ea5e9">Process</text>
      <path d="M168 18 H184" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="192" y="0" width="64" height="36" rx="5" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2"/>
      <text class="box-label" x="224" y="22" fill="#0ea5e9">Train</text>
      <path d="M264 18 H280" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="288" y="0" width="64" height="36" rx="5" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2"/>
      <text class="box-label" x="320" y="22" fill="#0ea5e9">Serve</text>
    </g>
  </g>

  <!-- Row 1 right: Monitoring -->
  <g transform="translate(420, 36)">
    <text class="section-title" x="0" y="0" fill="#10b981">Monitoring</text>
    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="120" height="50" rx="5" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="2"/>
      <rect x="10" y="10" width="28" height="12" fill="rgba(16,185,129,0.35)"/>
      <rect x="46" y="10" width="28" height="12" fill="rgba(16,185,129,0.35)"/>
      <rect x="82" y="10" width="28" height="12" fill="rgba(16,185,129,0.35)"/>
      <rect x="10" y="28" width="50" height="10" fill="rgba(16,185,129,0.35)"/>
      <rect x="68" y="28" width="42" height="10" fill="rgba(16,185,129,0.35)"/>
      <g transform="translate(140, 12)">
        <circle cx="0" cy="12" r="11" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
        <path d="M-5 -3 L5 9 M5 -3 L-5 9" stroke="#8b5cf6" stroke-width="1.5"/>
      </g>
      <g transform="translate(178, 12)">
        <circle cx="0" cy="12" r="11" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
        <circle cx="0" cy="12" r="5" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      </g>
      <g transform="translate(216, 12)">
        <circle cx="0" cy="12" r="11" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
        <path d="M-4 8 L4 16 M4 8 L-4 16" stroke="#8b5cf6" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- Row 1 far right: Metrics -->
  <g transform="translate(680, 36)">
    <text class="section-title" x="0" y="0" fill="#0ea5e9">Metrics</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="130" height="22" rx="4" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
      <text class="metric" x="10" y="15" fill="#10b981">Uptime 99.9%</text>
      <rect x="0" y="28" width="130" height="22" rx="4" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1"/>
      <text class="metric" x="10" y="43" fill="#8b5cf6">Latency 50ms</text>
    </g>
  </g>

  <!-- Row 2: Optimization -->
  <g transform="translate(48, 130)">
    <text class="section-title" x="0" y="0" fill="#f59e0b">Optimization</text>
    <g transform="translate(0, 14)">
      <g>
        <rect x="0" y="0" width="76" height="52" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="2"/>
        <path d="M10 38 Q22 30 38 26 T66 18" stroke="#f59e0b" stroke-width="2" fill="none"/>
        <text class="box-label" x="38" y="68" fill="#f59e0b">Performance</text>
      </g>
      <g transform="translate(92, 0)">
        <rect x="0" y="0" width="76" height="52" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="2"/>
        <rect x="12" y="30" width="10" height="14" fill="#f59e0b" opacity="0.7"/>
        <rect x="28" y="22" width="10" height="22" fill="#f59e0b" opacity="0.7"/>
        <rect x="44" y="26" width="10" height="18" fill="#f59e0b" opacity="0.7"/>
        <text class="box-label" x="38" y="68" fill="#f59e0b">Resources</text>
      </g>
      <g transform="translate(184, 0)">
        <rect x="0" y="0" width="76" height="52" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="2"/>
        <path d="M10 38 Q24 34 38 32 T66 28" stroke="#f59e0b" stroke-width="2" fill="none"/>
        <text class="box-label" x="38" y="68" fill="#f59e0b">Cost</text>
      </g>
    </g>
  </g>

  <!-- Row 2: Infrastructure + CI/CD -->
  <g transform="translate(420, 130)">
    <text class="section-title" x="0" y="0" fill="#3b82f6">Infrastructure</text>
    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="100" height="68" rx="5" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="2"/>
      <rect x="10" y="10" width="22" height="14" fill="rgba(59,130,246,0.35)"/>
      <rect x="38" y="10" width="22" height="14" fill="rgba(59,130,246,0.35)"/>
      <rect x="66" y="10" width="22" height="14" fill="rgba(59,130,246,0.35)"/>
      <rect x="10" y="30" width="32" height="14" fill="rgba(59,130,246,0.35)"/>
      <rect x="48" y="30" width="40" height="14" fill="rgba(59,130,246,0.35)"/>
      <rect x="10" y="50" width="78" height="10" fill="rgba(59,130,246,0.35)"/>
      <text class="box-label" x="50" y="88" fill="#3b82f6">Cloud</text>
    </g>
    <g transform="translate(120, 0)">
      <text class="section-title" x="0" y="0" fill="#ec4899">CI/CD</text>
      <rect x="0" y="14" width="248" height="68" rx="5" fill="rgba(236,72,153,0.1)" stroke="#ec4899" stroke-width="2"/>
      <circle cx="36" cy="40" r="7" fill="rgba(236,72,153,0.35)"/>
      <text class="box-label" x="36" y="58" fill="#ec4899">Build</text>
      <path d="M50 40 H66" stroke="#ec4899" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="88" cy="40" r="7" fill="rgba(236,72,153,0.35)"/>
      <text class="box-label" x="88" y="58" fill="#ec4899">Test</text>
      <path d="M102 40 H118" stroke="#ec4899" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="140" cy="40" r="7" fill="rgba(236,72,153,0.35)"/>
      <text class="box-label" x="140" y="58" fill="#ec4899">Deploy</text>
      <path d="M154 40 H170" stroke="#ec4899" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="192" cy="40" r="7" fill="rgba(236,72,153,0.35)"/>
      <text class="box-label" x="192" y="58" fill="#ec4899">Monitor</text>
    </g>
  </g>

  <!-- Data flow (right, mid) -->
  <g transform="translate(900, 130)">
    <text class="section-title" x="0" y="0" fill="#0ea5e9">Data Flow</text>
    <g transform="translate(0, 22)" fill="rgba(14,165,233,0.5)">
      <circle cx="0" cy="0" r="4"/>
      <circle cx="28" cy="12" r="4"/>
      <circle cx="56" cy="4" r="4"/>
      <circle cx="84" cy="16" r="4"/>
      <circle cx="112" cy="8" r="4"/>
    </g>
  </g>

  <!-- Title block (bottom, dedicated zone) -->
  <g transform="translate(56, 300)">
    <text class="tagline" x="0" y="0">MLOps · DevOps · Cloud Computing</text>
    <text class="title" x="0" y="58">AI 시스템 구축</text>
    <text class="subtitle" x="0" y="96">설계 · 배포 · 모니터링 · 자동화 · 최적화</text>

    <!-- Process steps (below subtitle, single row) -->
    <g transform="translate(0, 130)">
      <circle cx="0" cy="0" r="7" fill="#0ea5e9"/>
      <text class="step" x="14" y="4" fill="#0ea5e9">설계</text>
      <path d="M52 0 H68" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="88" cy="0" r="7" fill="#10b981"/>
      <text class="step" x="102" y="4" fill="#10b981">배포</text>
      <path d="M140 0 H156" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="176" cy="0" r="7" fill="#8b5cf6"/>
      <text class="step" x="190" y="4" fill="#8b5cf6">모니터링</text>
      <path d="M268 0 H284" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="304" cy="0" r="7" fill="#f59e0b"/>
      <text class="step" x="318" y="4" fill="#f59e0b">자동화</text>
      <path d="M388 0 H404" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="424" cy="0" r="7" fill="#ef4444"/>
      <text class="step" x="438" y="4" fill="#ef4444">최적화</text>
    </g>
  </g>
</svg>
